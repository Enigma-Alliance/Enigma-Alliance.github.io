<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="generator" content="enigma-tool-index">
<title>Tool Index</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0a0d0f; --panel:#10161a; --panel-2:#0d1316;
    --line:#1b262c; --line-2:#233138;
    --ink:#d8e2e6; --muted:#637179; --faint:#3b474d;
    --cyan:#2fe0cf; --cyan-dim:#1aa99c; --amber:#f2b441; --magenta:#ff4d9d;
    --mono:"JetBrains Mono",ui-monospace,Menlo,monospace;
  }
  *{box-sizing:border-box}
  html{-webkit-text-size-adjust:100%}
  body{
    margin:0; background:var(--bg); color:var(--ink);
    font-family:"Space Grotesk",system-ui,sans-serif;
    min-height:100vh;
    background-image:
      linear-gradient(var(--line) 1px,transparent 1px),
      linear-gradient(90deg,var(--line) 1px,transparent 1px);
    background-size:46px 46px; background-position:center;
  }
  body::before{ /* vignette so the grid fades at edges */
    content:""; position:fixed; inset:0; pointer-events:none;
    background:radial-gradient(120% 90% at 50% 0%,transparent 40%,var(--bg) 100%);
  }
  .wrap{max-width:860px; margin:0 auto; padding:0 20px; position:relative}

  /* ---- status strip ---- */
  .strip{
    display:flex; align-items:center; gap:10px;
    font-family:var(--mono); font-size:11px; letter-spacing:1.5px; text-transform:uppercase;
    color:var(--muted); padding:18px 0 0;
  }
  .dot{width:7px; height:7px; border-radius:50%; background:var(--cyan); box-shadow:0 0 8px var(--cyan)}
  .strip .sep{flex:1; height:1px; background:var(--line-2)}
  .strip .cnt{color:var(--cyan)}

  /* ---- masthead ---- */
  .mast{padding:26px 0 22px; border-bottom:1px solid var(--line-2)}
  .eyebrow{
    font-family:var(--mono); font-size:12px; letter-spacing:4px; text-transform:uppercase;
    color:var(--amber); margin:0 0 12px;
  }
  h1{
    font-size:clamp(40px,9vw,84px); line-height:.9; margin:0; font-weight:700; letter-spacing:-2px;
  }
  h1 .caret{
    display:inline-block; width:.5ch; background:var(--cyan); color:transparent;
    margin-left:6px; animation:blink 1.1s steps(1) infinite; box-shadow:0 0 14px var(--cyan);
  }
  @keyframes blink{50%{opacity:0}}
  .lede{color:var(--muted); margin:16px 0 0; max-width:48ch; font-size:15px; line-height:1.5}

  /* ---- list ---- */
  ul.tools{list-style:none; margin:6px 0 0; padding:0}
  ul.tools li{margin:0}
  a.tool{
    display:grid; grid-template-columns:auto 1fr auto; align-items:center; gap:18px;
    padding:20px 4px; text-decoration:none; color:inherit;
    border-bottom:1px solid var(--line); position:relative; transition:padding .18s ease;
  }
  a.tool:hover, a.tool:focus-visible{padding-left:16px; outline:none}
  a.tool::before{ /* sliding accent bar */
    content:""; position:absolute; left:-2px; top:18%; bottom:18%; width:2px;
    background:var(--cyan); box-shadow:0 0 10px var(--cyan);
    transform:scaleY(0); transform-origin:center; transition:transform .18s ease;
  }
  a.tool:hover::before, a.tool:focus-visible::before{transform:scaleY(1)}
  .num{font-family:var(--mono); font-size:13px; color:var(--faint); font-weight:500; padding-top:3px}
  a.tool:hover .num, a.tool:focus-visible .num{color:var(--amber)}
  .body .ttl{font-size:21px; font-weight:600; letter-spacing:-.3px; transition:color .18s ease}
  a.tool:hover .ttl, a.tool:focus-visible .ttl{color:var(--cyan)}
  .body .file{font-family:var(--mono); font-size:12px; color:var(--muted); margin-top:5px}
  .body .file .ext{color:var(--cyan-dim)}
  .body .desc{font-size:13px; color:var(--muted); margin-top:6px; line-height:1.45; max-width:54ch}
  .arrow{font-family:var(--mono); font-size:20px; color:var(--faint); transition:transform .18s ease,color .18s ease}
  a.tool:hover .arrow, a.tool:focus-visible .arrow{color:var(--cyan); transform:translateX(4px)}

  /* ---- states ---- */
  .state{
    font-family:var(--mono); font-size:13px; color:var(--muted);
    border:1px dashed var(--line-2); border-radius:10px; padding:22px; margin-top:18px; line-height:1.6;
  }
  .state b{color:var(--amber); font-weight:500}
  .state code{color:var(--cyan)}

  footer{
    display:flex; flex-wrap:wrap; gap:8px 16px; align-items:center;
    font-family:var(--mono); font-size:11px; letter-spacing:1px; text-transform:uppercase;
    color:var(--faint); padding:26px 0 40px; margin-top:14px; border-top:1px solid var(--line);
  }
  footer .src{color:var(--muted)}
  footer .src b{color:var(--cyan-dim); font-weight:500}

  @media(prefers-reduced-motion:reduce){
    h1 .caret{animation:none} a.tool,.arrow,.num,.ttl,a.tool::before{transition:none}
  }
  @media(max-width:520px){
    a.tool{grid-template-columns:auto 1fr; gap:6px 14px}
    .arrow{grid-column:2; justify-self:end; margin-top:-6px}
  }
</style>
</head>
<body>
<div class="wrap">

  <div class="strip">
    <span class="dot"></span><span>tool index</span>
    <span class="sep"></span>
    <span class="cnt" id="stripCount">scanning…</span>
  </div>

  <header class="mast">
    <p class="eyebrow">Enigma Alliance</p>
    <h1>Index<span class="caret">_</span></h1>
    <p class="lede">Flat-file tools in this directory. Pick one to launch.</p>
  </header>

  <main>
    <ul class="tools" id="list"></ul>
    <div class="state" id="state" hidden></div>
  </main>

  <footer>
    <span id="footCount">0 tools</span>
    <span class="src" id="source"></span>
  </footer>

</div>

<script>
/* ============================================================
   CONFIG
   ------------------------------------------------------------
   Option A — auto-list from GitHub (best for GitHub Pages):
     set REPO to "user/repo". Every .html in DIR shows up
     automatically, no manual upkeep.
   Option B — manual list (works anywhere, incl. file://):
     leave REPO = "" and edit PAGES below.
   META gives any file a nicer title + description (optional).
   ============================================================ */
const REPO   = "";          // e.g. "AidanDougan/RideTelemetry"
const BRANCH = "main";      // or "gh-pages"
const DIR    = "";          // subfolder, e.g. "tools" — "" = repo root

const PAGES = [
  "batch-convert.html",
    "collage.html",
    "loop-logo.html",
    "loop-reel.html",
    "slicedice.html",
    "step-repeat.html",
    "texture.html",
    "ayce-price-checker.html"
];

const META = {
    "batch-convert.html": {
        title: "batch//convert",
        desc: "batch convert any image file into PNG"
    },
    "collage.html": {
        title: "coll//age",
        desc: "arrange photos into a collage and pack / export"
    },
    "loop-logo.html": {
        title: "loop//logo",
        desc: "individual image gif / mp4 maker for logo animations"
    },
    "loop-reel.html": {
        title: "loop//reel",
        desc: "screensaver maker using images with controls and export mp4"
    },
    "slicedice.html": {
        title: "slice//dice",
        desc: "slice input image into rows and columns "
    },
    "step-repeat.html": {
        title: "step//repeat",
        desc: "exports png of step and repeat with input images"
    },
    "texture.html": {
        title: "tex//ture",
        desc: "generate noise textures based on input variables"
    },
    "ayce-price-checker.html": {
        title: "AYCE Price Checker",
        desc: "Sukihanna Sushi all-you-can-eat price estimator"
    }
};

/* ---- machinery ---- */
const SELF = (location.pathname.split("/").pop() || "index.html").toLowerCase();
const EXCLUDE = new Set([SELF, "index.html"]);

const prettify = f => f.replace(/\.html?$/i,"")
  .replace(/[-_]+/g," ").trim()
  .replace(/\b\w/g, c => c.toUpperCase());

function toEntry(file){
  const m = META[file] || {};
  return { file, title: m.title || prettify(file), desc: m.desc || "" };
}

async function fromGitHub(){
  const path = DIR ? `/${DIR.replace(/^\/|\/$/g,"")}` : "";
  const url = `https://api.github.com/repos/${REPO}/contents${path}?ref=${BRANCH}`;
  const res = await fetch(url, {headers:{Accept:"application/vnd.github+json"}});
  if(!res.ok) throw new Error(`GitHub API ${res.status}`);
  const items = await res.json();
  return items
    .filter(i => i.type==="file" && /\.html?$/i.test(i.name))
    .map(i => i.name);
}

function dedupeSort(names){
  const seen = new Set(); const out = [];
  for(const n of names){
    const key = n.toLowerCase();
    if(EXCLUDE.has(key) || seen.has(key)) continue;
    seen.add(key); out.push(n);
  }
  return out.sort((a,b)=>a.localeCompare(b, undefined, {numeric:true}));
}

function render(entries, sourceLabel){
  const list = document.getElementById("list");
  const state = document.getElementById("state");
  document.getElementById("source").innerHTML = sourceLabel;

  if(!entries.length){
    list.innerHTML = "";
    state.hidden = false;
    state.innerHTML = `No other HTML files found.<br>
      Add filenames to the <b>PAGES</b> list in this file's &lt;script&gt;, or set
      <code>REPO</code> to auto-list from GitHub.`;
    setCount(0); return;
  }
  state.hidden = true;
  list.innerHTML = entries.map((e,i)=>`
    <li><a class="tool" href="${encodeURI(e.file)}">
      <span class="num">${String(i+1).padStart(2,"0")}</span>
      <span class="body">
        <span class="ttl">${e.title}</span>
        <span class="file">${e.file.replace(/(\.html?)$/i,'<span class="ext">$1</span>')}</span>
        ${e.desc ? `<span class="desc">${e.desc}</span>` : ""}
      </span>
      <span class="arrow">→</span>
    </a></li>`).join("");
  setCount(entries.length);
}

function setCount(n){
  const label = `${n} tool${n===1?"":"s"}`;
  document.getElementById("stripCount").textContent = n ? label : "empty";
  document.getElementById("footCount").textContent = label;
}

(async function init(){
  let names, src;
  if(REPO){
    try{
      names = await fromGitHub();
      src = `source · <b>github:${REPO}</b>`;
    }catch(err){
      names = PAGES;
      src = `source · <b>manifest</b> (github unreachable)`;
    }
  }else{
    names = PAGES;
    src = `source · <b>manifest</b>`;
  }
  render(dedupeSort(names).map(toEntry), src);
})();
</script>
</body>
</html>
