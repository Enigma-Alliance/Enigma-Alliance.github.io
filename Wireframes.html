/* ── Shared annotation component ── */
const Note = ({children, color="#e6a817", x, y, rotate="-2deg"}) => (
  <div style={{
    position:'absolute', left:x, top:y,
    transform:`rotate(${rotate})`,
    fontFamily:'Caveat,cursive', fontSize:13, color,
    background:'rgba(255,255,255,0.92)', padding:'2px 7px',
    border:`1px solid ${color}`, borderRadius:3, zIndex:10,
    whiteSpace:'nowrap', lineHeight:1.4
  }}>{children}</div>
);

const Arrow = ({x,y,rotate="0deg",color="#e6a817"}) => (
  <div style={{position:'absolute',left:x,top:y,transform:`rotate(${rotate})`,
    fontFamily:'Caveat,cursive',fontSize:18,color,zIndex:10,lineHeight:1}}>→</div>
);
