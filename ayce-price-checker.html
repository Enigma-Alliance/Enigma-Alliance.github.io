<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sukihanna Sushi — À la Carte Price Checker</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  /* ------------------------------------------------------------------
     EDIT PRICES HERE → the DATA array near the bottom of <script>.
     Each item: { n: name, p: effective à-la-carte price per AYCE order,
                  note: basis, flag: 'prorated' | 'est' | undefined }
     ------------------------------------------------------------------ */
  :root{
    --paper:#f6f3ec;
    --card:#fffdf8;
    --ink:#1c1a17;
    --muted:#8c8478;
    --faint:#cfc7b8;
    --red:#c2342b;
    --red-deep:#9c271f;
    --amber:#caa15a;
    --line:#e4ddd0;
    --mono: ui-monospace,"SFMono-Regular",Menlo,"JetBrains Mono",monospace;
  }
  *{box-sizing:border-box}
  html{-webkit-text-size-adjust:100%}
  body{
    margin:0; background:var(--paper); color:var(--ink);
    font-family:"Inter",system-ui,sans-serif; line-height:1.4;
    padding-bottom:120px;
  }
  .wrap{max-width:1180px; margin:0 auto; padding:0 18px}

  /* ---- header ---- */
  header{border-top:6px solid var(--red); background:var(--paper)}
  .head-inner{
    display:flex; flex-wrap:wrap; align-items:flex-end; gap:14px 26px;
    padding:22px 18px 18px; max-width:1180px; margin:0 auto;
  }
  .brand{margin-right:auto}
  .brand h1{
    font-family:"Oswald",sans-serif; font-weight:700; letter-spacing:.5px;
    font-size:clamp(26px,4.4vw,40px); line-height:.95; margin:0; text-transform:uppercase;
  }
  .brand h1 span{color:var(--red)}
  .brand .sub{
    font-family:"Oswald",sans-serif; font-weight:500; letter-spacing:3px;
    text-transform:uppercase; font-size:12px; color:var(--muted); margin-top:6px;
  }
  .tools{display:flex; flex-wrap:wrap; gap:10px; align-items:center}
  .field{position:relative}
  .field input{
    font:inherit; padding:9px 12px 9px 32px; border:1px solid var(--line);
    background:var(--card); border-radius:8px; width:190px; color:var(--ink);
  }
  .field.small input{width:74px; padding-left:12px; text-align:center}
  .field .ic{position:absolute; left:11px; top:50%; transform:translateY(-50%); color:var(--muted); font-size:14px}
  .field label{
    position:absolute; left:12px; top:-8px; background:var(--paper); padding:0 5px;
    font-size:10px; letter-spacing:1.5px; text-transform:uppercase; color:var(--muted);
  }
  button.ghost{
    font:inherit; font-weight:600; cursor:pointer; padding:9px 14px;
    border:1px solid var(--line); background:var(--card); border-radius:8px; color:var(--red-deep);
  }
  button.ghost:hover{border-color:var(--red); color:var(--red)}

  /* ---- meta strip ---- */
  .meta{
    max-width:1180px; margin:0 auto; padding:0 18px;
    display:flex; flex-wrap:wrap; gap:10px 20px; align-items:center;
    font-size:12px; color:var(--muted); padding-bottom:16px;
  }
  .meta b{color:var(--ink); font-weight:600}
  .legend{display:flex; gap:14px; flex-wrap:wrap; margin-left:auto}
  .legend span{display:inline-flex; align-items:center; gap:5px}
  .tag{font-family:var(--mono); font-size:11px; padding:1px 5px; border-radius:4px; font-weight:600}
  .tag.pr{background:#eef3f0; color:#3f7a5e}
  .tag.es{background:#fbeee9; color:var(--red-deep)}

  /* ---- columns ---- */
  .board{display:grid; grid-template-columns:1fr 1fr; gap:26px; padding:8px 0 40px}
  @media(max-width:820px){ .board{grid-template-columns:1fr; gap:18px} }
  .col > h2{
    font-family:"Oswald",sans-serif; text-transform:uppercase; letter-spacing:2px;
    font-size:15px; margin:0 0 12px; padding-bottom:8px; border-bottom:2px solid var(--ink);
    display:flex; align-items:center; gap:10px;
  }
  .col > h2 .lim{
    margin-left:auto; font-family:"Inter"; font-weight:500; letter-spacing:0; text-transform:none;
    font-size:10.5px; color:var(--muted); border:1px solid var(--line); padding:3px 7px; border-radius:5px;
  }
  .section{
    background:var(--card); border:1px solid var(--line); border-radius:12px;
    padding:14px 16px 10px; margin-bottom:16px;
  }
  .section h3{
    font-family:"Oswald",sans-serif; text-transform:uppercase; letter-spacing:1px;
    color:var(--red); font-size:14px; margin:0 0 4px; display:flex; align-items:baseline; gap:8px;
  }
  .section h3 .ltr{
    font-weight:700; color:#fff; background:var(--red); border-radius:5px;
    font-size:11px; padding:2px 7px; letter-spacing:0;
  }
  .section h3 .por{margin-left:auto; font-family:"Inter"; font-weight:400; text-transform:none; letter-spacing:0; font-size:11px; color:var(--muted)}

  /* ---- item row ---- */
  .row{display:flex; align-items:center; gap:8px; padding:7px 0; border-bottom:1px dotted var(--faint)}
  .row:last-child{border-bottom:0}
  .row.hide{display:none}
  .name{display:flex; flex-direction:column; min-width:0}
  .name .t{font-size:14.5px; font-weight:500; white-space:nowrap; overflow:hidden; text-overflow:ellipsis}
  .name .t .tag{margin-left:6px; vertical-align:1px}
  .name .b{font-size:10.5px; color:var(--muted); font-family:var(--mono); margin-top:1px}
  .leader{flex:1 1 auto; border-bottom:1px dotted var(--faint); height:1px; min-width:14px; transform:translateY(4px)}
  .price{font-family:var(--mono); font-size:13px; color:var(--ink); white-space:nowrap}
  .price .cur{color:var(--muted)}

  /* ---- stepper ---- */
  .step{display:flex; align-items:center; gap:0; flex:0 0 auto}
  .step button{
    width:28px; height:30px; border:1px solid var(--line); background:var(--paper);
    cursor:pointer; font-size:17px; line-height:1; color:var(--red-deep); font-family:var(--mono);
    display:flex; align-items:center; justify-content:center;
  }
  .step button:first-child{border-radius:7px 0 0 7px}
  .step button:last-child{border-radius:0 7px 7px 0}
  .step button:hover{background:#fff; border-color:var(--red); color:var(--red)}
  .step button:active{background:var(--red); color:#fff}
  .step input{
    width:40px; height:30px; border:1px solid var(--line); border-left:0; border-right:0;
    text-align:center; font-family:var(--mono); font-size:14px; background:#fff; color:var(--ink);
    -moz-appearance:textfield;
  }
  .step input::-webkit-outer-spin-button,.step input::-webkit-inner-spin-button{-webkit-appearance:none; margin:0}
  .row.active{background:linear-gradient(90deg,rgba(202,161,90,.10),transparent 70%); border-radius:6px}
  .row.active .step input{border-color:var(--amber); color:var(--red-deep); font-weight:600}

  /* ---- receipt footer ---- */
  .dock{
    position:fixed; left:0; right:0; bottom:0; z-index:30;
    background:rgba(28,26,23,.97); color:#f6f3ec; backdrop-filter:blur(6px);
    border-top:3px solid var(--red);
  }
  .dock-bar{
    max-width:1180px; margin:0 auto; padding:12px 18px;
    display:flex; align-items:center; gap:16px;
  }
  .dock .lab{font-family:"Oswald",sans-serif; letter-spacing:2px; text-transform:uppercase; font-size:11px; color:#b9b1a3}
  .dock .total{font-family:var(--mono); font-size:clamp(24px,4vw,34px); font-weight:700; line-height:1}
  .dock .total .cur{color:var(--amber); font-size:.6em; vertical-align:.18em; margin-right:2px}
  .dock .cnt{font-size:12px; color:#b9b1a3; font-family:var(--mono)}
  .dock .ayce{font-size:11px; color:#b9b1a3; margin-left:4px}
  .dock .ayce b{color:#f6f3ec}
  .dock .spacer{margin-left:auto}
  .dock button{font:inherit; cursor:pointer; border-radius:8px; font-weight:600; padding:9px 14px; border:1px solid #4a463f; background:transparent; color:#f6f3ec}
  .dock button:hover{border-color:var(--amber); color:var(--amber)}
  .dock button.x:hover{border-color:var(--red); color:#ff8a80}

  .receipt{max-height:0; overflow:hidden; transition:max-height .25s ease}
  .receipt.open{max-height:46vh; overflow:auto}
  .receipt-inner{max-width:1180px; margin:0 auto; padding:4px 18px 16px}
  .rline{display:flex; gap:10px; align-items:baseline; padding:5px 0; border-bottom:1px dotted #423e38; font-size:13px}
  .rline .rn{flex:1 1 auto}
  .rline .rq{font-family:var(--mono); color:#b9b1a3; white-space:nowrap}
  .rline .rt{font-family:var(--mono); white-space:nowrap; min-width:64px; text-align:right}
  .rempty{padding:16px 0; color:#b9b1a3; font-size:13px}

  @media(prefers-reduced-motion:reduce){.receipt{transition:none}}
  :focus-visible{outline:2px solid var(--amber); outline-offset:2px}
  @media(max-width:520px){
    .dock .ayce{display:none}
    .field input{width:150px}
  }
</style>
</head>
<body>
<header>
  <div class="head-inner">
    <div class="brand">
      <h1>Sukihanna <span>Sushi</span></h1>
      <div class="sub">All You Can Eat · À la carte price check</div>
    </div>
    <div class="tools">
      <div class="field">
        <span class="ic">⌕</span>
        <input id="filter" type="text" placeholder="Find an item…" aria-label="Filter items">
      </div>
      <div class="field small">
        <label for="guests">Guests</label>
        <input id="guests" type="number" min="1" value="1" aria-label="Number of guests">
      </div>
      <button class="ghost" id="reset" type="button">Reset</button>
    </div>
  </div>
  <div class="meta">
    <span>Enter how many of each you'd order. Total shows what it would cost <b>à la carte</b> instead of the AYCE flat rate.</span>
    <span class="legend">
      <span><span class="tag pr">pro</span> portion pro-rated to AYCE count</span>
      <span><span class="tag es">est</span> no à la carte price — estimate</span>
    </span>
  </div>
</header>

<div class="wrap">
  <div class="board" id="board"></div>
</div>

<div class="dock">
  <div class="receipt" id="receipt"><div class="receipt-inner" id="receiptInner"></div></div>
  <div class="dock-bar">
    <div>
      <div class="lab">À la carte total</div>
      <div class="total"><span class="cur">$</span><span id="total">0.00</span></div>
    </div>
    <div class="cnt" id="count">0 items</div>
    <div class="ayce" id="ayceRef"></div>
    <div class="spacer"></div>
    <button type="button" id="toggleReceipt" aria-expanded="false">Receipt ▴</button>
    <button type="button" class="x" id="clear">Clear</button>
  </div>
</div>

<script>
const FLAT = 29.99; // AYCE price per person (reference only)

/* price = effective à-la-carte cost for ONE AYCE order of that item */
const DATA = [
 {col:"sushi", code:"A", title:"Sashimi", por:"1 pc / order · à la carte sold 2 pc", items:[
   {n:"Salmon", p:3.25, note:"alc 2pc $6.50"},
   {n:"Tuna", p:3.25, note:"alc 2pc $6.50"},
   {n:"Tamago", p:2.48, note:"alc 2pc $4.95"},
   {n:"Escolar", p:3.25, note:"alc 2pc $6.50"},
   {n:"Krab", p:2.48, note:"alc Krab Stick 2pc $4.95"},
   {n:"Tilapia", p:2.98, note:"no alc listing", flag:"est"},
 ]},
 {col:"sushi", code:"B", title:"Nigiri", por:"1 pc / order · à la carte sold 2 pc", items:[
   {n:"Tuna", p:3.25, note:"alc 2pc $6.50"},
   {n:"Salmon", p:3.25, note:"alc 2pc $6.50"},
   {n:"Tilapia", p:2.98, note:"no alc listing", flag:"est"},
   {n:"Escolar", p:3.25, note:"alc 2pc $6.50"},
   {n:"Yellowtail", p:3.48, note:"alc 2pc $6.95"},
   {n:"Surf Clam", p:2.98, note:"alc 2pc $5.95"},
   {n:"Octopus", p:2.98, note:"alc 2pc $5.95"},
   {n:"Eel", p:2.98, note:"alc 2pc $5.95"},
   {n:"Tamago", p:2.48, note:"alc 2pc $4.95"},
   {n:"Shrimp", p:2.48, note:"alc 2pc $4.95"},
   {n:"Krab", p:2.48, note:"alc 2pc $4.95"},
 ]},
 {col:"sushi", code:"C", title:"Maki / Temaki", por:"8 pc roll", items:[
   {n:"California", p:6.95},
   {n:"Spicy California", p:7.95},
   {n:"Philadelphia", p:7.95},
   {n:"Salmon Cheese", p:7.95},
   {n:"Salmon Avocado", p:7.95},
   {n:"Alaska", p:7.95},
   {n:"Tuna Avocado", p:7.95},
   {n:"Salmon", p:6.95},
   {n:"Smoked Salmon", p:7.95},
   {n:"Spicy Tuna", p:7.95},
   {n:"Spicy Salmon", p:7.95},
   {n:"Krab", p:7.95},
   {n:"Tuna", p:6.95},
   {n:"Yellowtail", p:7.50},
   {n:"Mango Avocado", p:6.95},
   {n:"Eel Avocado", p:7.95},
   {n:"Salmon Skin", p:7.95},
   {n:"Avocado", p:5.50},
   {n:"Shrimp Tempura", p:8.95},
   {n:"Chicken Tempura", p:8.50},
   {n:"Sweet Potato", p:6.95},
 ]},
 {col:"sushi", code:"D", title:"Special Roll", por:"8 pc roll", items:[
   {n:"Salmon Tempura", p:8.95},
   {n:"New York", p:8.50},
   {n:"Spider", p:10.95},
   {n:"Hard Rock", p:8.95},
   {n:"Tiger", p:12.95},
   {n:"Paradise", p:13.50},
   {n:"Mexican", p:12.50},
   {n:"Super Man", p:13.50},
   {n:"Dragon", p:12.50},
   {n:"Crazy Salmon", p:13.50},
   {n:"Crazy Tuna", p:13.50},
   {n:"Rainbow", p:12.50},
   {n:"Mama", p:12.95},
   {n:"Snow White", p:13.50},
   {n:"Black Dragon", p:13.50},
   {n:"Angry Dragon", p:12.95},
   {n:"Suki Hanna", p:13.50},
   {n:"John Young", p:12.50},
   {n:"Orlando", p:11.50},
   {n:"American Dream", p:11.50},
   {n:"Godzilla", p:11.50},
 ]},

 {col:"kitchen", code:"A", title:"Soup & Salad", items:[
   {n:"Miso Soup", p:3.50},
   {n:"Clear Soup", p:3.50},
   {n:"House Salad", p:4.95},
   {n:"Squid Salad", p:7.95, note:"alc Ika Sansai $7.95"},
   {n:"Kani Salad", p:7.95},
   {n:"Seaweed Salad", p:6.95},
   {n:"Cucumber Salad", p:4.95, note:"no alc listing", flag:"est"},
 ]},
 {col:"kitchen", code:"B", title:"Appetizer", items:[
   {n:"Edamame", p:6.95},
   {n:"Gyoza", p:7.95, note:"4pc · alc $7.95 (pcs n/a)"},
   {n:"Takoyaki", p:2.83, note:"2pc · alc 6pc $8.50", flag:"prorated"},
   {n:"Chicken Nuggets", p:6.95, note:"4pc · no alc listing", flag:"est"},
   {n:"Spring Roll", p:4.63, note:"2pc · alc Haru Maki 3pc $6.95", flag:"prorated"},
   {n:"Shumai", p:7.95, note:"4pc · alc $7.95 (pcs n/a)"},
   {n:"Krab Rangoon", p:5.97, note:"4pc · alc 6pc $8.95", flag:"prorated"},
 ]},
 {col:"kitchen", code:"C", title:"Tempura", items:[
   {n:"Shrimp Tempura", p:10.50, note:"2pc · alc appetizer portion"},
   {n:"Krabmeat Tempura", p:8.95, note:"2pc · no alc listing", flag:"est"},
   {n:"Chicken Katsu", p:11.50, note:"lunch-special basis", flag:"est"},
   {n:"Chicken Tempura", p:9.50, note:"2pc · alc appetizer portion"},
   {n:"Vegetable Tempura", p:8.95, note:"4pc · alc appetizer portion"},
   {n:"Pork Katsu", p:11.50, note:"lunch-special basis", flag:"est"},
 ]},
 {col:"kitchen", code:"D", title:"Teriyaki", items:[
   {n:"Chicken Teriyaki", p:15.95, note:"no alc teriyaki listing", flag:"est"},
   {n:"Salmon Teriyaki", p:17.95, note:"no alc teriyaki listing", flag:"est"},
   {n:"Grill Calamari", p:10.50, note:"alc $10.50"},
   {n:"White Rice", p:2.95, note:"alc side $2.95"},
   {n:"Beef Teriyaki", p:17.95, note:"no alc teriyaki listing", flag:"est"},
   {n:"Shrimp Teriyaki", p:17.95, note:"4pc · no alc listing", flag:"est"},
   {n:"Egg Fried Rice", p:4.50, note:"alc side $4.50"},
 ]},
 {col:"kitchen", code:"E", title:"Dessert", items:[
   {n:"Green Tea Ice Cream", p:5.95, b:"ice"},
   {n:"Vanilla Ice Cream", p:5.95, b:"ice"},
   {n:"Strawberry Ice Cream", p:5.95, b:"ice"},
   {n:"Fried Cheesecake", p:9.95, b:"cake", note:"AYCE plain · alc incl. ice cream $9.95"},
 ]},
];

const LIMITS = {
  sushi:"Limit 10 pc nigiri & sashimi + 3 rolls / person, per round",
  kitchen:"Limit 3 kitchen items / person, per round"
};
const COLN = {sushi:"Sushi Bar", kitchen:"Kitchen"};

const money = n => n.toLocaleString("en-US",{minimumFractionDigits:2,maximumFractionDigits:2});
const qty = {};   // id -> count
let id = 0;

/* ---- build the board ---- */
const board = document.getElementById("board");
["sushi","kitchen"].forEach(col=>{
  const c = document.createElement("section");
  c.className = "col";
  c.innerHTML = `<h2>${COLN[col]}<span class="lim">${LIMITS[col]}</span></h2>`;
  DATA.filter(s=>s.col===col).forEach(sec=>{
    const box = document.createElement("div");
    box.className = "section";
    box.innerHTML = `<h3><span class="ltr">${sec.code}</span>${sec.title}` +
      (sec.por?`<span class="por">${sec.por}</span>`:"") + `</h3>`;
    sec.items.forEach(it=>{
      const myId = "i"+(id++);
      qty[myId] = 0;
      const tag = it.flag==="prorated" ? '<span class="tag pr">pro</span>'
                : it.flag==="est" ? '<span class="tag es">est</span>' : "";
      const row = document.createElement("div");
      row.className = "row";
      row.dataset.id = myId;
      row.dataset.search = it.n.toLowerCase();
      row.innerHTML = `
        <div class="name">
          <span class="t">${it.n}${tag}</span>
          ${it.note?`<span class="b">${it.note}</span>`:""}
        </div>
        <span class="leader"></span>
        <span class="price"><span class="cur">$</span>${money(it.p)}</span>
        <div class="step">
          <button type="button" data-act="dec" aria-label="Remove one ${it.n}">−</button>
          <input type="number" inputmode="numeric" min="0" value="0" aria-label="Quantity of ${it.n}">
          <button type="button" data-act="inc" aria-label="Add one ${it.n}">+</button>
        </div>`;
      row._price = it.p; row._name = it.n; row._por = sec.por||""; row._bundle = it.b||"";
      box.appendChild(row);
    });
    c.appendChild(box);
  });
  board.appendChild(c);
});

/* ---- interaction ---- */
const totalEl = document.getElementById("total");
const countEl = document.getElementById("count");
const ayceEl  = document.getElementById("ayceRef");
const guestsEl= document.getElementById("guests");

function setQty(row, val){
  val = Math.max(0, parseInt(val,10) || 0);
  qty[row.dataset.id] = val;
  const input = row.querySelector("input");
  input.value = val;
  row.classList.toggle("active", val>0);
  recompute();
}

board.addEventListener("click", e=>{
  const btn = e.target.closest("button[data-act]");
  if(!btn) return;
  const row = e.target.closest(".row");
  const cur = qty[row.dataset.id];
  setQty(row, btn.dataset.act==="inc" ? cur+1 : cur-1);
});
board.addEventListener("input", e=>{
  if(e.target.matches(".step input")) setQty(e.target.closest(".row"), e.target.value);
});

const ICE_PRICE = 5.95; // à la carte ice cream; one is bundled into each fried cheesecake

function recompute(){
  let gross=0, entered=0, iceQ=0, cakeQ=0;
  const raw=[];
  document.querySelectorAll(".row").forEach(row=>{
    const q = qty[row.dataset.id];
    if(q>0){
      raw.push({n:row._name, q, por:row._por, price:row._price, bundle:row._bundle});
      gross += q*row._price; entered += q;
      if(row._bundle==="ice")  iceQ += q;
      if(row._bundle==="cake") cakeQ += q;
    }
  });

  // Each à la carte fried cheesecake already includes an ice cream,
  // so waive up to one ice cream per cheesecake.
  const waived = Math.min(iceQ, cakeQ);
  const credit = waived * ICE_PRICE;
  const total  = gross - credit;
  const items  = entered - waived;

  // Build receipt lines, trimming waived ice creams off the ice-cream rows.
  let trim = waived;
  const lines=[];
  raw.forEach(r=>{
    let q = r.q;
    if(r.bundle==="ice" && trim>0){ const cut=Math.min(trim,q); q-=cut; trim-=cut; }
    if(q>0) lines.push({n:r.n, q, por:r.por, lt:q*r.price});
  });

  totalEl.textContent = money(total);
  countEl.textContent = items + (items===1?" item":" items");
  const g = Math.max(1, parseInt(guestsEl.value,10)||1);
  ayceEl.innerHTML = `vs AYCE <b>$${money(FLAT*g)}</b> (${g}×$${money(FLAT)})`;
  renderReceipt(lines, total, waived, credit);
}

const receiptInner = document.getElementById("receiptInner");
function renderReceipt(lines, total, waived, credit){
  if(!lines.length && !waived){
    receiptInner.innerHTML = `<div class="rempty">No items yet — add quantities and your à la carte tab builds here.</div>`;
    return;
  }
  let html = lines.map(l=>{
    const por = l.por ? ` · ${l.por.split('·')[0].trim()}` : "";
    return `<div class="rline">
      <span class="rn">${l.n}<span class="rq" style="font-family:inherit;color:var(--amber)">${por}</span></span>
      <span class="rq">${l.q} × $${money(l.lt/l.q)}</span>
      <span class="rt">$${money(l.lt)}</span>
    </div>`;
  }).join("");
  if(waived>0){
    html += `<div class="rline" style="color:#9ec7ad">
      <span class="rn">↳ Ice cream included with cheesecake</span>
      <span class="rq">${waived} free</span>
      <span class="rt">−$${money(credit)}</span>
    </div>`;
  }
  html += `<div class="rline" style="border-bottom:0;font-weight:700;margin-top:4px">
     <span class="rn">À la carte total</span><span class="rq"></span>
     <span class="rt">$${money(total)}</span></div>`;
  receiptInner.innerHTML = html;
}

/* ---- filter ---- */
document.getElementById("filter").addEventListener("input", e=>{
  const q = e.target.value.trim().toLowerCase();
  document.querySelectorAll(".section").forEach(sec=>{
    let any=false;
    sec.querySelectorAll(".row").forEach(row=>{
      const hit = !q || row.dataset.search.includes(q);
      row.classList.toggle("hide", !hit);
      if(hit) any=true;
    });
    sec.style.display = any ? "" : "none";
  });
});

/* ---- receipt toggle ---- */
const receipt = document.getElementById("receipt");
const tBtn = document.getElementById("toggleReceipt");
tBtn.addEventListener("click", ()=>{
  const open = receipt.classList.toggle("open");
  tBtn.setAttribute("aria-expanded", open);
  tBtn.textContent = open ? "Receipt ▾" : "Receipt ▴";
});

/* ---- resets ---- */
function clearAll(){
  document.querySelectorAll(".row").forEach(row=>setQty(row,0));
}
document.getElementById("clear").addEventListener("click", clearAll);
document.getElementById("reset").addEventListener("click", ()=>{
  clearAll();
  document.getElementById("filter").value="";
  document.getElementById("filter").dispatchEvent(new Event("input"));
});
guestsEl.addEventListener("input", recompute);

recompute();
</script>
</body>
</html>
