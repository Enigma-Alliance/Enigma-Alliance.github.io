<style>

<body>
<script type="text/babel">

/* ── Shared tokens ── */
const A = "#e67f8e";
const LIME = "#f2ffb4";
const BG = "#0a0a0a";
const BG2 = "#111111";
const LINE = "#2a1e22";
const DIM = "#7a6068";
const STEEL = "#f5f0f1";
const MONO = "'IBM Plex Mono', monospace";

/* ── Shared Nav ── */
const Nav = ({crumbs=null}) => (
  <div style={{height:52,borderBottom:`1px solid ${LINE}`,display:'flex',alignItems:'center',padding:'0 48px',justifyContent:'space-between',background:'rgba(0,0,0,0.6)'}}>
    <div style={{display:'flex',alignItems:'center',gap:14}}>
      <img src="logo.png" style={{width:34,height:34,borderRadius:'50%',objectFit:'contain'}} alt="EA" />
      <div>
        <div style={{fontSize:12,fontWeight:700,color:A,letterSpacing:'0.14em'}}>ENIGMA ALLIANCE</div>
        {crumbs && <div style={{fontSize:9,color:DIM,letterSpacing:'0.1em',marginTop:1}}>{crumbs}</div>}
      </div>
    </div>
    <div style={{display:'flex',gap:0}}>
      {["PROJECTS","ABOUT","RESUME"].map(l=>(
        <span key={l} style={{padding:'8px 20px',fontSize:10,letterSpacing:'0.12em',color:DIM,borderLeft:`1px solid ${LINE}`,cursor:'pointer'}}>{l}</span>
      ))}
    </div>
  </div>
);

/* ── Annotation helpers ── */
const Note = ({children,x,y,rotate="-1.5deg",color=A}) => (
  <div style={{position:'absolute',left:x,top:y,transform:`rotate(${rotate})`,fontFamily:'Caveat,cursive',fontSize:13,color,background:'rgba(14,13,11,0.95)',padding:'3px 8px',border:`1px solid ${color}`,borderRadius:3,zIndex:20,whiteSpace:'nowrap',lineHeight:1.4,pointerEvents:'none'}}>{children}</div>
);
const Bracket = ({x,y,w,h,label,color=A,side='top'}) => (
  <div style={{position:'absolute',left:x,top:y,width:w,height:h,border:`1.5px dashed ${color}44`,zIndex:10,pointerEvents:'none'}}>
    {label && <span style={{position:'absolute',top:side==='top'?-18:h+4,left:0,fontFamily:'Caveat,cursive',fontSize:12,color,whiteSpace:'nowrap'}}>{label}</span>}
  </div>
);

/* ══════════════════════════════════════════
   DEPTH 1 — HOME PAGE
   ══════════════════════════════════════════ */
const HomePage = () => {
  const projects = [
    {n:"001",t:"DOUGH OR DIE",d:"Run a bakery. Fight mechs. Coming to Steam.",tags:["GAME","UE5"],role:"Product Owner"},
    {n:"002",t:"CLIPPED",d:"Stealth platformer. Art-heist ferret. Best Mechanic.",tags:["GAME","UE5"],role:"Project Lead"},
    {n:"003",t:"CRESCENDO",d:"CV-powered physical therapy platform.",tags:["TOOL","CV"],role:"Project Lead"},

      {/* HERO */}

        {/* Ghost grid texture */}

        <div style={{position:'absolute',top:24,left:48,fontSize:148,fontWeight:700,lineHeight:0.85,letterSpacing:'-0.04em',color:`${A}0f`,userSelect:'none',pointerEvents:'none',zIndex:1}}>

        {projects.map(({n,t,d,tags,role})=>(

            <div style={{padding:'16px 18px'}}>

        <div style={{fontSize:12,color:DIM,lineHeight:1.8}}>

        </div>
        <div style={{display:'flex',flexDirection:'column',gap:8,fontSize:10,color:DIM}}>
          <span>aidandougan24@gmail.com</span>
          <a style={{color:A,textDecoration:'none'}}>Resume ↓</a>
        </div>
      </div>

      {/* FOOTER */}
      <div style={{height:40,borderTop:`1px solid ${LINE}`,display:'flex',alignItems:'center',justifyContent:'space-between',padding:'0 48px',fontSize:9,color:DIM,letterSpacing:'0.15em'}}>
        <span>© 2025 ENIGMA ALLIANCE — AIDAN DOUGAN</span>
        <span>EOF //</span>
      </div>
    </div>

};

    </div>

    {/* HERO BANNER — full bleed */}
    <div style={{position:'relative',height:380}}>
      <div className="hatch-dark" style={{width:'100%',height:'100%',display:'flex',alignItems:'center',justifyContent:'center',flexDirection:'column',gap:8}}>
        <span style={{fontFamily:'Caveat,cursive',color:DIM,fontSize:16}}>DoughOrDieHeader.png</span>
        <span style={{fontFamily:'Caveat,cursive',color:'#2e2820',fontSize:12}}>full-bleed, object-fit: cover</span>
      </div>
      {/* Gradient overlay */}
      <div style={{position:'absolute',inset:0,background:'linear-gradient(to top,rgba(14,13,11,1) 0%,rgba(14,13,11,0.0) 50%)'}} />

    {/* MAIN CONTENT */}

      {/* LEFT — description */}
      <div>
        <div style={{fontSize:10,color:A,letterSpacing:'0.2em',marginBottom:12}}>OVERVIEW</div>
